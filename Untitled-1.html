<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Pratsu</title>
<style>
    body {
        margin: 0;
        font-family: 'Georgia', serif;
        background: linear-gradient(to bottom, #5c4033, #d2b48c);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    .box {
        background: #8b5e3c;
        padding: 30px;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        transition: transform 0.3s ease;
        z-index: 2;
    }

    .box:hover {
        transform: scale(1.05);
    }

    .hidden {
        display: none;
    }

    .flowers {
        position: fixed;
        top: -50px;
        font-size: 24px;
        animation: fall linear infinite;
        z-index: 1;
    }

    @keyframes fall {
        0% { transform: translateY(-50px); opacity: 1; }
        100% { transform: translateY(100vh); opacity: 0; }
    }

    .message {
        margin-top: 20px;
        font-size: 18px;
        line-height: 1.6;
        max-width: 500px;
        border-right: 2px solid #fff;
        white-space: nowrap;
        overflow: hidden;
    }

    iframe {
        margin-top: 20px;
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="box" onclick="showMessage()">
    <h2>I am sorry Pratsu 💔</h2>
    <p>Click me...</p>

    <div id="content" class="hidden">
        <div id="typingText" class="message"></div>
        <iframe id="song" width="300" height="170" src="" title="Meri Banogi Kya" allow="autoplay"></iframe>
    </div>
</div>

<script>
const text = "Pratsu, I truly want to say that I am deeply sorry from the bottom of my heart. I know I may have hurt you, and I regret my actions more than I can express in words. You mean so much to me, and seeing you upset is something I never wanted. I understand that apologies don't erase what happened, but I genuinely want to make things right and learn from my mistakes. Please know that I care about you deeply, and I promise to be better, more understanding, and more thoughtful moving forward. I hope you can find it in your heart to forgive me, because your presence in my life is something I truly value and never want to lose.";

let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typingText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 30);
    }
}

function createFlower() {
    const flower = document.createElement("div");
    flower.classList.add("flowers");
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * window.innerWidth + "px";
    flower.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(flower);

    setTimeout(() => {
        flower.remove();
    }, 5000);
}

function startFlowers() {
    setInterval(createFlower, 300);
}

function showMessage() {
    document.getElementById('content').classList.remove('hidden');
    document.getElementById('song').src = "https://www.youtube.com/embed/3cX8Xw9XQ0M?autoplay=1";
    typeEffect();
    startFlowers();
}
</script>

</body>
</html>
